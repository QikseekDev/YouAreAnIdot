<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chomens Discord</title>

<style>
:root {
    --bg: #0b0f1a;
    --accent: #5865F2;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.14);
}

* {
    box-sizing: border-box;
    font-family: Inter, system-ui, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -200px, #1e293b, var(--bg));
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 460px;
    padding: 2.4rem;
    background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.02));
    border: 1px solid var(--border);
    border-radius: 22px;
    backdrop-filter: blur(14px);
    box-shadow: 0 40px 90px rgba(0,0,0,.6);
    animation: fadeUp .6s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo {
    display: flex;
    justify-content: center;
    margin-bottom: 1.6rem;
}

.logo-circle {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: white;
    font-size: 1.2rem;
}

h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: .4rem;
}

p {
    text-align: center;
    color: var(--muted);
    font-size: .95rem;
    margin-bottom: 2rem;
}

.actions {
    display: grid;
    gap: .9rem;
}

button {
    border: none;
    border-radius: 14px;
    padding: 1rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s ease;
}

.btn-discord {
    background: linear-gradient(135deg, var(--accent), #4752c4);
    color: white;
}

.btn-discord:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 30px rgba(88,101,242,.45);
}

.btn-nah {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
}

.btn-nah:hover {
    background: rgba(255,255,255,.05);
    color: var(--text);
}

/* Spinner */
.spinner {
    margin: 1.6rem auto 0;
    width: 46px;
    display: flex;
    justify-content: space-between;
}

.spinner div {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}

.spinner div:nth-child(1) { animation-delay: -.32s; }
.spinner div:nth-child(2) { animation-delay: -.16s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

/* Popup required message */
.popup-warning {
    margin-top: 1.5rem;
    padding: 1.1rem 1.2rem;
    border-radius: 14px;
    background: linear-gradient(
        180deg,
        rgba(239,68,68,.22),
        rgba(239,68,68,.1)
    );
    border: 1px solid rgba(239,68,68,.5);
    color: #fee2e2;
    font-size: .92rem;
    text-align: center;
    display: none;
    animation: shakeIn .35s ease;
}

.popup-warning strong {
    display: block;
    font-size: 1rem;
    margin-bottom: .25rem;
}

.popup-warning span {
    display: block;
    margin-top: .35rem;
    font-size: .85rem;
    color: #fca5a5;
}

@keyframes shakeIn {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">
        <div class="logo-circle">C</div>
    </div>

    <h1>Chomens (copy) Discord</h1>
    <p>Click below to join our Discord server.</p>

    <div class="actions">
        <button class="btn-discord" id="discord_btn">Join Discord</button>
        <button class="btn-nah" id="nah_btn">Maybe later</button>
    </div>

    <div id="spinner_holder"></div>

    <div id="popup_needed" class="popup-warning">
        <strong>Pop-ups must be enabled</strong>
        Discord opens the invite in a new window.
        <span>Please allow pop-ups for this site to continue.</span>
    </div>
</div>

<script>
let isYouScriptLoaded = false;

function loadYouScript(cb) {
    if (isYouScriptLoaded) { cb(); return; }
    const s = document.createElement('script');
    s.src = '/scripts/you.js';
    s.onload = () => { isYouScriptLoaded = true; cb(); };
    s.onerror = () => console.error('Failed to load you.js');
    document.head.appendChild(s);
}

function checkPopupPermission(callback) {
    let popups = [];
    let allowed = true;

    try {
        for (let i = 0; i < 5; i++) {
            const p = window.open('', '', 'width=1,height=1,left=-10000,top=-10000');
            if (!p) { allowed = false; break; }
            popups.push(p);
        }

        setTimeout(() => {
            popups.forEach(p => { try { p.close(); } catch {} });
            callback(allowed);
        }, 200);
    } catch {
        popups.forEach(p => { try { p.close(); } catch {} });
        callback(false);
    }
}

function handleClick(e) {
    e.preventDefault();

    document.getElementById('popup_needed').style.display = 'none';
    document.getElementById('spinner_holder').innerHTML =
        '<div class="spinner"><div></div><div></div><div></div></div>';

    checkPopupPermission(isAllowed => {
        if (!isAllowed) {
            document.getElementById('spinner_holder').innerHTML = '';
            document.getElementById('popup_needed').style.display = 'block';
            return;
        }

        loadYouScript(() => {
            if (typeof window.runYouScript === 'function') {
                window.runYouScript();
            }
            document.getElementById('spinner_holder').innerHTML = '';
        });
    });
}

document.getElementById('discord_btn').addEventListener('click', handleClick);
document.getElementById('nah_btn').addEventListener('click', handleClick);
</script>

<!-- Google Translate (silent auto translate) -->
<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        { pageLanguage: 'en', autoDisplay: false },
        'google_translate_element'
    );
}

var gt = document.createElement('div');
gt.id = 'google_translate_element';
gt.style.display = 'none';
document.body.appendChild(gt);

var s = document.createElement('script');
s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
document.head.appendChild(s);

setTimeout(() => {
    try {
        const lang = navigator.language.split('-')[0];
        const select = document.querySelector('select.goog-te-combo');
        if (select) {
            select.value = lang;
            select.dispatchEvent(new Event('change'));
        }
    } catch {}
}, 1500);
</script>

</body>
</html>
